name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check generated code is up to date
        run: |
          go generate ./pg/ast/...
          go generate ./mysql/ast/...
          git diff --exit-code pg/ast/walk_generated.go mysql/ast/walk_generated.go

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -short ./...
