name: Oracle Tests

on:
  schedule:
    # Run daily at 08:00 UTC (17:00 JST)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  oracle-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Oracle tests (PG catalog)
        run: go test -timeout 15m ./pg/catalog/ -run TestOracle -count=1 -v

      - name: Oracle tests (MySQL catalog)
        run: go test -timeout 15m ./mysql/catalog/ -run TestOracle -count=1 -v
